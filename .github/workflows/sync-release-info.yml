name: Sync download info

on:
  release:
    types: [published, edited]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-release-info
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate download.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-release-info.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download.json
          if git diff --cached --quiet; then
            echo "download.json already up to date"
          else
            git commit -m "chore: sync download info from latest release"
            git push origin main
          fi
